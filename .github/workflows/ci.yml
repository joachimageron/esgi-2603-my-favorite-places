name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/**'
            client:
              - 'client/**'
              - '.github/workflows/**'

  server:
    name: Build server
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - if: needs.changes.outputs.server == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - if: needs.changes.outputs.server == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - if: needs.changes.outputs.server == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile

      - if: needs.changes.outputs.server == 'true'
        name: Build
        run: pnpm run build

      - if: needs.changes.outputs.server == 'true'
        name: Test
        run: pnpm run test

  client:
    name: Build client
    runs-on: ubuntu-latest
    needs: changes
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - if: needs.changes.outputs.client == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - if: needs.changes.outputs.client == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - if: needs.changes.outputs.client == 'true'
        name: Install dependencies
        run: pnpm install --frozen-lockfile

      - if: needs.changes.outputs.client == 'true'
        name: Lint
        run: pnpm run lint

      - if: needs.changes.outputs.client == 'true'
        name: Test
        run: pnpm run test

      - if: needs.changes.outputs.client == 'true'
        name: Build
        run: pnpm run build

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [changes, server, client]
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: needs.changes.outputs.server == 'true' || needs.changes.outputs.client == 'true'
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for server image
        if: needs.changes.outputs.server == 'true'
        id: meta-server
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ghcr.io/${{ github.repository_owner }}/mfp-server
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push server image
        if: needs.changes.outputs.server == 'true'
        id: push-server
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: ./server
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}

      - name: Attest server image
        if: needs.changes.outputs.server == 'true' && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/mfp-server
          subject-digest: ${{ steps.push-server.outputs.digest }}
          push-to-registry: true

      - name: Extract metadata for client image
        if: needs.changes.outputs.client == 'true'
        id: meta-client
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ghcr.io/${{ github.repository_owner }}/mfp-client
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push client image
        if: needs.changes.outputs.client == 'true'
        id: push-client
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: ./client
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}

      - name: Attest client image
        if: needs.changes.outputs.client == 'true' && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/mfp-client
          subject-digest: ${{ steps.push-client.outputs.digest }}
          push-to-registry: true
